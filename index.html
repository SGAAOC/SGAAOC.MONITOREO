<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Monitoreo - EsSalud</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #003d7a 0%, #0055a4 100%);
            color: white;
            padding: 8px 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .nav-tabs {
            display: flex;
            gap: 3px;
            background: rgba(255,255,255,0.1);
            padding: 3px;
            border-radius: 20px;
        }

        .tab-button {
            padding: 7px 18px;
            border: none;
            background: transparent;
            color: white;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 17px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .tab-button:hover {
            background: rgba(255,255,255,0.2);
        }

        .tab-button.active {
            background: white;
            color: #003d7a;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .main-container {
            height: calc(100vh - 40px);
            width: 100%;
            position: relative;
        }

        .iframe-wrapper {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            z-index: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .iframe-wrapper.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        @media (max-width: 768px) {
            .tab-button {
                padding: 5px 12px;
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <nav class="nav-tabs">
                <button class="tab-button active" onclick="showProject('eel', this)">
                    ESSALUD EN LÍNEA
                </button>
                <button class="tab-button" onclick="showProject('linea107', this)">
                    LÍNEA 107
                </button>
                <button class="tab-button" onclick="showProject('farmacia', this)">
                    FARMACIA VECINA
                </button>
            </nav>
        </div>
    </header>

    <div class="main-container">
        <div id="eel" class="iframe-wrapper active">
            <iframe src="EEL.html" name="EEL Frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
        </div>
        
        <div id="linea107" class="iframe-wrapper">
            <iframe src="LINEA_107.html" name="Linea107 Frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
        </div>
        
        <div id="farmacia" class="iframe-wrapper">
            <iframe src="FARMACIA_VECINA.html" name="Farmacia Frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
        </div>
    </div>

    <script>
        function showProject(projectName, button) {
            // Remover clase active de todos los botones
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Activar el botón clickeado
            button.classList.add('active');
            
            // Ocultar todos los iframes (solo visualmente, no se recargan)
            const wrappers = document.querySelectorAll('.iframe-wrapper');
            wrappers.forEach(wrapper => wrapper.classList.remove('active'));
            
            // Mostrar el iframe seleccionado
            document.getElementById(projectName).classList.add('active');
        }

        // Prevenir que los iframes se recarguen al cambiar de pestaña
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                const wrappers = document.querySelectorAll('.iframe-wrapper');
                wrappers.forEach(wrapper => wrapper.classList.remove('active'));
                document.querySelector('.iframe-wrapper.active').classList.add('active');
            }
        });
    </script>
</body>
</html>
